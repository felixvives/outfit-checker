<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Combina?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --ink: #1A1814;
    --ink-muted: #7A7670;
    --ink-faint: #C8C5BE;
    --accent: #C8A97E;
    --accent-dark: #8B6E4E;
    --yes: #2D6A4F;
    --yes-bg: #D8F3DC;
    --no: #9B2335;
    --no-bg: #FFE4E8;
    --warn: #7B4F00;
    --warn-bg: #FFF3CD;
    --radius: 16px;
    --radius-sm: 8px;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
    --shadow: 0 2px 16px rgba(26,24,20,0.08);
    --shadow-lg: 0 8px 40px rgba(26,24,20,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* Header */
  header {
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    border-bottom: 1px solid var(--ink-faint);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .logo em { font-style: italic; color: var(--accent-dark); }
  .tagline {
    font-size: 0.75rem;
    color: var(--ink-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Main layout */
  main {
    max-width: 540px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* Mode toggle */
  .mode-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--surface);
    border: 1px solid var(--ink-faint);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 1.75rem;
    gap: 4px;
  }
  .mode-btn {
    padding: 0.6rem 1rem;
    border: none;
    border-radius: calc(var(--radius) - 4px);
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    background: transparent;
    color: var(--ink-muted);
  }
  .mode-btn.active {
    background: var(--ink);
    color: #fff;
  }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--ink-faint);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: #FEFCF8;
  }
  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
  }
  .upload-title {
    font-family: var(--font-display);
    font-size: 1.05rem;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .upload-sub { font-size: 0.78rem; color: var(--ink-muted); }

  /* Preview (foto completa) */
  #preview-container {
    margin-top: 1rem;
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
    position: relative;
  }
  #preview-img {
    width: 100%;
    max-height: 360px;
    object-fit: cover;
    display: block;
  }
  .preview-clear {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(26,24,20,0.6);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 14px;
    line-height: 1;
  }

  /* Por prendas */
  .prendas-grid {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .prenda-card {
    background: var(--surface);
    border: 1px solid var(--ink-faint);
    border-radius: var(--radius);
    padding: 1rem;
    display: grid;
    grid-template-columns: 72px 1fr auto;
    gap: 1rem;
    align-items: center;
    transition: border-color 0.2s;
  }
  .prenda-card.has-image { border-color: var(--accent); }
  .prenda-thumb {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-sm);
    background: var(--bg);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
  }
  .prenda-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  .prenda-thumb input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .prenda-thumb-icon { color: var(--ink-faint); pointer-events: none; }
  .prenda-info { flex: 1; min-width: 0; }
  .prenda-name {
    font-weight: 500;
    font-size: 0.9rem;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .prenda-status {
    font-size: 0.75rem;
    color: var(--ink-muted);
  }
  .prenda-swatch-row {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }
  .prenda-swatch {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid rgba(26,24,20,0.12);
    flex-shrink: 0;
  }

  /* CTA button */
  .btn-analyze {
    width: 100%;
    padding: 1rem;
    border: none;
    border-radius: var(--radius);
    background: var(--ink);
    color: #fff;
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 1rem;
    letter-spacing: 0.02em;
  }
  .btn-analyze:hover { background: #2D2A26; transform: translateY(-1px); }
  .btn-analyze:active { transform: translateY(0); }
  .btn-analyze:disabled { background: var(--ink-faint); cursor: not-allowed; transform: none; }

  /* Loading */
  .loading-state {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 2.5px solid var(--ink-faint);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: var(--font-display);
    font-style: italic;
    color: var(--ink-muted);
    font-size: 1rem;
  }

  /* Results */
  #result-panel { display: none; }

  .result-header {
    text-align: center;
    padding: 2rem 1rem 1.5rem;
  }
  .verdict-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 99px;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .verdict-badge.yes { background: var(--yes-bg); color: var(--yes); }
  .verdict-badge.no  { background: var(--no-bg);  color: var(--no); }
  .verdict-badge.partial { background: var(--warn-bg); color: var(--warn); }

  .verdict-title {
    font-family: var(--font-display);
    font-size: 2rem;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }
  .verdict-subtitle {
    font-size: 0.9rem;
    color: var(--ink-muted);
    max-width: 340px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* Palette card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--ink-faint);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .result-card-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 1rem;
  }

  .palette-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--bg);
  }
  .palette-row:last-child { border-bottom: none; }
  .palette-swatch-lg {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(26,24,20,0.1);
    flex-shrink: 0;
  }
  .palette-info { flex: 1; }
  .palette-color-name { font-size: 0.85rem; font-weight: 500; color: var(--ink); }
  .palette-prenda { font-size: 0.75rem; color: var(--ink-muted); }
  .palette-hex {
    font-size: 0.75rem;
    font-family: monospace;
    color: var(--ink-muted);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Compatibility matrix */
  .compat-pair {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--bg);
  }
  .compat-pair:last-child { border-bottom: none; }
  .compat-swatches { display: flex; gap: 4px; }
  .compat-swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(26,24,20,0.1);
  }
  .compat-desc { flex: 1; font-size: 0.82rem; color: var(--ink-muted); }
  .compat-icon { font-size: 14px; }

  /* Suggestion box */
  .suggestion-box {
    background: #FEFCF8;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .suggestion-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-dark);
    margin-bottom: 6px;
  }
  .suggestion-text { font-size: 0.88rem; color: var(--ink); line-height: 1.55; }

  /* Reset button */
  .btn-reset {
    width: 100%;
    padding: 0.85rem;
    border: 1.5px solid var(--ink-faint);
    border-radius: var(--radius);
    background: transparent;
    color: var(--ink-muted);
    font-family: var(--font-body);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  .btn-reset:hover { border-color: var(--ink); color: var(--ink); }

  /* Utility */
  .hidden { display: none !important; }
  .section-divider {
    height: 1px;
    background: var(--ink-faint);
    margin: 1.5rem 0;
    opacity: 0.4;
  }
</style>
</head>
<body>

<header>
  <div class="logo">¿<em>Combina</em>?</div>
  <div class="tagline">Análisis de outfit · 100% local</div>
</header>

<main>
  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="completo">Foto completa</button>
    <button class="mode-btn" data-mode="prendas">Por prendas</button>
  </div>

  <!-- Input panels -->
  <div id="input-area">

    <!-- Panel: Foto completa -->
    <div class="panel active" id="panel-completo">
      <div class="upload-zone" id="drop-completo">
        <input type="file" id="file-completo" accept="image/*">
        <div class="upload-icon">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
        </div>
        <div class="upload-title">Subí tu foto de outfit</div>
        <div class="upload-sub">JPG o PNG · máx. 10 MB</div>
      </div>
      <div id="preview-container">
        <img id="preview-img" alt="Vista previa del outfit">
        <button class="preview-clear" id="clear-completo" title="Quitar foto">✕</button>
      </div>
    </div>

    <!-- Panel: Por prendas -->
    <div class="panel" id="panel-prendas">
      <div class="prendas-grid">

        <!-- Camisa -->
        <div class="prenda-card" id="card-camisa">
          <div class="prenda-thumb" id="thumb-camisa">
            <svg class="prenda-thumb-icon" width="28" height="28" fill="none" viewBox="0 0 28 28" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 3 C9 3 10 6 14 6 C18 6 19 3 19 3 L24 7 L21 10 L21 25 L7 25 L7 10 L4 7 Z"/>
            </svg>
            <img id="img-camisa" alt="Camisa">
            <input type="file" accept="image/*" data-prenda="camisa">
          </div>
          <div class="prenda-info">
            <div class="prenda-name">Camisa / camiseta</div>
            <div class="prenda-status" id="status-camisa">Tocá para agregar foto</div>
            <div class="prenda-swatch-row" id="swatches-camisa"></div>
          </div>
        </div>

        <!-- Pantalón -->
        <div class="prenda-card" id="card-pantalon">
          <div class="prenda-thumb" id="thumb-pantalon">
            <svg class="prenda-thumb-icon" width="28" height="28" fill="none" viewBox="0 0 32 32" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <rect x="7" y="4" width="18" height="3" rx="1.5"/>
              <path d="M7 7 Q6 7 6 8 L10 28 L16 28 L16 7"/>
              <path d="M25 7 Q26 7 26 8 L22 28 L16 28 L16 7"/>
            </svg>
            <img id="img-pantalon" alt="Pantalón">
            <input type="file" accept="image/*" data-prenda="pantalon">
          </div>
          <div class="prenda-info">
            <div class="prenda-name">Pantalón / falda</div>
            <div class="prenda-status" id="status-pantalon">Tocá para agregar foto</div>
            <div class="prenda-swatch-row" id="swatches-pantalon"></div>
          </div>
        </div>

        <!-- Zapatos -->
        <div class="prenda-card" id="card-zapatos">
          <div class="prenda-thumb" id="thumb-zapatos">
            <svg class="prenda-thumb-icon" width="28" height="28" fill="none" viewBox="0 0 32 32" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 22 L3 17 Q4 14 7 13 L11 13 Q12 13 13 10 Q14.5 7 17 8 L23 12 Q27 14.5 27 19 L27 22 Z"/>
              <path d="M3 22 Q3 25 5 25 L25 25 Q28 25 28 22 L27 22 L3 22"/>
              <line x1="11" y1="13" x2="11" y2="18"/>
            </svg>
            <img id="img-zapatos" alt="Zapatos">
            <input type="file" accept="image/*" data-prenda="zapatos">
          </div>
          <div class="prenda-info">
            <div class="prenda-name">Zapatos / calzado</div>
            <div class="prenda-status" id="status-zapatos">Tocá para agregar foto</div>
            <div class="prenda-swatch-row" id="swatches-zapatos"></div>
          </div>
        </div>

      </div>
    </div>

    <button class="btn-analyze" id="btn-analyze" disabled>Analizar outfit</button>
  </div>

  <!-- Loading -->
  <div class="loading-state" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Analizando colores…</div>
  </div>

  <!-- Result -->
  <div id="result-panel">
    <div class="result-header">
      <div class="verdict-badge" id="verdict-badge"></div>
      <div class="verdict-title" id="verdict-title"></div>
      <div class="verdict-subtitle" id="verdict-subtitle"></div>
    </div>

    <div class="result-card">
      <div class="result-card-label">Colores detectados</div>
      <div id="palette-list"></div>
    </div>

    <div class="result-card" id="compat-card">
      <div class="result-card-label">Compatibilidad entre prendas</div>
      <div id="compat-list"></div>
    </div>

    <div class="suggestion-box" id="suggestion-box">
      <div class="suggestion-label">Sugerencia</div>
      <div class="suggestion-text" id="suggestion-text"></div>
    </div>

    <button class="btn-reset" id="btn-reset">← Analizar otro outfit</button>
  </div>

</main>

<script>
// ─── State ────────────────────────────────────────────────
const state = {
  mode: 'completo',
  completo: null,      // { file, img, colors }
  prendas: {
    camisa:   { file: null, img: null, colors: [] },
    pantalon: { file: null, img: null, colors: [] },
    zapatos:  { file: null, img: null, colors: [] },
  }
};

const colorThief = new ColorThief();

// ─── Mode toggle ──────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + state.mode).classList.add('active');
    checkReady();
  });
});

// ─── Foto completa ────────────────────────────────────────
const fileCompleto = document.getElementById('file-completo');
const previewContainer = document.getElementById('preview-container');
const previewImg = document.getElementById('preview-img');

fileCompleto.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  loadImageFile(file, previewImg, () => {
    state.completo = { file, img: previewImg, colors: [] };
    previewContainer.style.display = 'block';
    checkReady();
  });
});

document.getElementById('clear-completo').addEventListener('click', () => {
  state.completo = null;
  previewContainer.style.display = 'none';
  previewImg.src = '';
  fileCompleto.value = '';
  checkReady();
});

// Drag & drop
const dropZone = document.getElementById('drop-completo');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    loadImageFile(file, previewImg, () => {
      state.completo = { file, img: previewImg, colors: [] };
      previewContainer.style.display = 'block';
      checkReady();
    });
  }
});

// ─── Por prendas ──────────────────────────────────────────
document.querySelectorAll('[data-prenda]').forEach(input => {
  input.addEventListener('change', e => {
    const prenda = e.target.dataset.prenda;
    const file = e.target.files[0];
    if (!file) return;

    const img = document.getElementById('img-' + prenda);
    loadImageFile(file, img, () => {
      img.style.display = 'block';
      state.prendas[prenda].file = file;
      state.prendas[prenda].img = img;
      document.getElementById('card-' + prenda).classList.add('has-image');
      document.getElementById('status-' + prenda).textContent = 'Foto cargada ✓';
      extractPrendaColors(prenda, img);
      checkReady();
    });
  });
});

// ─── Helpers ──────────────────────────────────────────────
function loadImageFile(file, imgEl, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    imgEl.onload = cb;
    imgEl.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function extractPrendaColors(prenda, img) {
  try {
    const palette = colorThief.getPalette(img, 4);
    const colors = palette.map(rgb => ({ rgb, hex: rgbToHex(rgb) }));
    const filtered = filterColors(colors);
    state.prendas[prenda].colors = filtered.length > 0 ? filtered : colors.slice(0, 2);

    const swatchRow = document.getElementById('swatches-' + prenda);
    swatchRow.innerHTML = '';
    state.prendas[prenda].colors.slice(0, 3).forEach(c => {
      const s = document.createElement('div');
      s.className = 'prenda-swatch';
      s.style.background = c.hex;
      swatchRow.appendChild(s);
    });
  } catch(e) { console.warn('color-thief error', e); }
}

function rgbToHex([r, g, b]) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function rgbToHsl([r, g, b]) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [h * 360, s * 100, l * 100];
}

// Filtra colores muy neutros (fondos blancos/negros/grises)
function filterColors(colors) {
  return colors.filter(c => {
    const [h, s, l] = rgbToHsl(c.rgb);
    // Excluir casi-blancos (l>88%), casi-negros (l<8%), grises sin saturación (s<12%)
    if (l > 88 || l < 8) return false;
    if (s < 12) return false;
    return true;
  });
}

// Nombre aproximado de color basado en HSL
function colorName(rgb) {
  const [h, s, l] = rgbToHsl(rgb);
  if (s < 15) {
    if (l > 75) return 'Blanco roto';
    if (l < 25) return 'Casi negro';
    return 'Gris';
  }
  if (l < 22) return 'Muy oscuro';
  if (l > 78) return 'Muy claro';
  const hue = h;
  if (hue < 15 || hue >= 345) return 'Rojo';
  if (hue < 30) return 'Naranja rojizo';
  if (hue < 45) return 'Naranja';
  if (hue < 65) return 'Amarillo';
  if (hue < 80) return 'Amarillo verdoso';
  if (hue < 150) return 'Verde';
  if (hue < 170) return 'Verde azulado';
  if (hue < 200) return 'Cian';
  if (hue < 240) return 'Azul';
  if (hue < 270) return 'Azul violeta';
  if (hue < 290) return 'Violeta';
  if (hue < 320) return 'Magenta';
  if (hue < 345) return 'Rosado';
  return 'Rojo';
}

function checkReady() {
  const btn = document.getElementById('btn-analyze');
  if (state.mode === 'completo') {
    btn.disabled = !state.completo;
  } else {
    const loaded = Object.values(state.prendas).filter(p => p.file).length;
    btn.disabled = loaded < 2;
    if (loaded === 1) btn.textContent = 'Agregá al menos 2 prendas';
    else btn.textContent = 'Analizar outfit';
  }
}

// ─── Analysis ────────────────────────────────────────────
document.getElementById('btn-analyze').addEventListener('click', analyze);

async function analyze() {
  document.getElementById('input-area').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  await sleep(600); // pequeño delay para que se vea el spinner

  let prendaColors = [];

  if (state.mode === 'completo') {
    try {
      const palette = colorThief.getPalette(state.completo.img, 6);
      const colors = palette.map(rgb => ({ rgb, hex: rgbToHex(rgb), prenda: 'Outfit completo' }));
      const filtered = filterColors(colors);
      prendaColors = (filtered.length >= 2 ? filtered : colors).slice(0, 4).map((c, i) => ({
        ...c, prenda: `Color ${i+1}`
      }));
    } catch(e) {
      prendaColors = [];
    }
  } else {
    ['camisa', 'pantalon', 'zapatos'].forEach(p => {
      if (state.prendas[p].file && state.prendas[p].colors.length > 0) {
        const label = p === 'camisa' ? 'Camisa' : p === 'pantalon' ? 'Pantalón' : 'Zapatos';
        prendaColors.push({ ...state.prendas[p].colors[0], prenda: label });
      }
    });
  }

  const result = evaluateOutfit(prendaColors);
  renderResult(prendaColors, result);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('result-panel').style.display = 'block';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Color theory evaluation ──────────────────────────────
function hueDiff(h1, h2) {
  const d = Math.abs(h1 - h2);
  return d > 180 ? 360 - d : d;
}

function isNeutral(rgb) {
  const [h, s, l] = rgbToHsl(rgb);
  return s < 20 || l > 82 || l < 12;
}

function pairRelationship(rgb1, rgb2) {
  const [h1, s1, l1] = rgbToHsl(rgb1);
  const [h2, s2, l2] = rgbToHsl(rgb2);
  const dH = hueDiff(h1, h2);
  const n1 = isNeutral(rgb1), n2 = isNeutral(rgb2);

  if (n1 || n2) return { score: 90, label: 'Neutro + color', note: 'Los neutros combinan con casi todo.' };
  if (dH < 30) return { score: 85, label: 'Colores análogos', note: 'Tonos cercanos en el círculo cromático, muy armoniosos.' };
  if (dH > 150 && dH < 210) return { score: 80, label: 'Colores complementarios', note: 'Contraste fuerte pero equilibrado, clásico en moda.' };
  if (dH > 100 && dH <= 150) return { score: 65, label: 'Semi-complementarios', note: 'Combinación interesante con algo de tensión visual.' };
  if (dH >= 30 && dH < 70) return { score: 70, label: 'Análogos distantes', note: 'Funcionan bien si uno de los dos es más suave.' };
  if (dH >= 70 && dH < 100) return { score: 55, label: 'Contraste medio', note: 'Pueden chocar si ambos son muy saturados.' };
  return { score: 45, label: 'Colores discordantes', note: 'Esta combinación puede generar tensión visual.' };
}

function evaluateOutfit(prendaColors) {
  if (prendaColors.length < 2) {
    return { score: 50, verdict: 'partial', title: 'Pocas prendas para analizar', subtitle: 'Necesito al menos 2 colores distintos para dar un resultado.', pairs: [], suggestion: 'Intentá subir fotos con mejor iluminación o sobre fondo neutro.' };
  }

  const pairs = [];
  for (let i = 0; i < prendaColors.length - 1; i++) {
    for (let j = i + 1; j < prendaColors.length; j++) {
      const rel = pairRelationship(prendaColors[i].rgb, prendaColors[j].rgb);
      pairs.push({ a: prendaColors[i], b: prendaColors[j], ...rel });
    }
  }

  const avgScore = pairs.reduce((s, p) => s + p.score, 0) / pairs.length;
  const minScore = Math.min(...pairs.map(p => p.score));

  let verdict, title, subtitle, suggestion;

  if (avgScore >= 78 && minScore >= 60) {
    verdict = 'yes';
    title = 'Tu outfit combina muy bien';
    subtitle = buildPositiveSubtitle(prendaColors);
    suggestion = buildSuggestion(prendaColors, 'yes');
  } else if (avgScore >= 60 || minScore >= 50) {
    verdict = 'partial';
    title = 'Combina con matices';
    subtitle = 'Hay buenas combinaciones pero algún par genera tensión visual.';
    suggestion = buildSuggestion(prendaColors, 'partial');
  } else {
    verdict = 'no';
    title = 'El outfit tiene conflictos de color';
    subtitle = 'Algunos colores chocan entre sí. Te doy sugerencias para mejorarlo.';
    suggestion = buildSuggestion(prendaColors, 'no');
  }

  return { score: Math.round(avgScore), verdict, title, subtitle, pairs, suggestion };
}

function buildPositiveSubtitle(prendaColors) {
  const hasNeutral = prendaColors.some(c => isNeutral(c.rgb));
  if (hasNeutral) return 'La base de neutros da estabilidad y permite que los colores con tono destaquen.';
  const [h1, s1, l1] = rgbToHsl(prendaColors[0].rgb);
  const [h2, s2, l2] = rgbToHsl(prendaColors[1].rgb);
  const dH = hueDiff(h1, h2);
  if (dH < 30) return 'Los tonos análogos crean una paleta cohesiva y sofisticada.';
  if (dH > 150) return 'El contraste complementario da energía sin perder elegancia.';
  return 'La paleta de colores tiene buena armonía en conjunto.';
}

function buildSuggestion(prendaColors, verdict) {
  const hasNeutral = prendaColors.some(c => isNeutral(c.rgb));
  if (verdict === 'yes') {
    if (hasNeutral) return 'Para agregar interés visual, podés incorporar un accesorio en el color más saturado de tu paleta actual.';
    return 'Si querés bajar la intensidad, cambiá uno de los colores por su versión más suave o desaturada.';
  }
  if (verdict === 'partial') {
    return 'Intentá reemplazar la prenda con el color más saturado por una versión en tono neutro (gris, beige, blanco) para equilibrar el conjunto.';
  }
  // no
  if (hasNeutral) return 'Aunque tenés neutros, los colores con tono están demasiado distantes. Intentá que las dos prendas de color sean análogas (tonos cercanos).';
  return 'Elegí una prenda ancla en negro, gris o beige y construí el resto del outfit a partir de un solo color de acento.';
}

// ─── Render result ────────────────────────────────────────
function renderResult(prendaColors, result) {
  // Verdict badge
  const badge = document.getElementById('verdict-badge');
  const icons = { yes: '✓', no: '✕', partial: '~' };
  const labels = { yes: 'Combina', no: 'No combina', partial: 'Parcialmente' };
  badge.className = 'verdict-badge ' + result.verdict;
  badge.textContent = icons[result.verdict] + ' ' + labels[result.verdict];

  document.getElementById('verdict-title').textContent = result.title;
  document.getElementById('verdict-subtitle').textContent = result.subtitle;

  // Palette
  const paletteList = document.getElementById('palette-list');
  paletteList.innerHTML = '';
  prendaColors.forEach(c => {
    const row = document.createElement('div');
    row.className = 'palette-row';
    row.innerHTML = `
      <div class="palette-swatch-lg" style="background:${c.hex}"></div>
      <div class="palette-info">
        <div class="palette-color-name">${colorName(c.rgb)}</div>
        <div class="palette-prenda">${c.prenda}</div>
      </div>
      <div class="palette-hex">${c.hex}</div>
    `;
    paletteList.appendChild(row);
  });

  // Compatibility pairs
  const compatList = document.getElementById('compat-list');
  compatList.innerHTML = '';
  if (result.pairs && result.pairs.length > 0) {
    result.pairs.forEach(pair => {
      const row = document.createElement('div');
      row.className = 'compat-pair';
      const icon = pair.score >= 75 ? '✓' : pair.score >= 55 ? '~' : '✕';
      row.innerHTML = `
        <div class="compat-swatches">
          <div class="compat-swatch" style="background:${pair.a.hex}"></div>
          <div class="compat-swatch" style="background:${pair.b.hex}"></div>
        </div>
        <div class="compat-desc">${pair.a.prenda} + ${pair.b.prenda} — ${pair.note}</div>
        <div class="compat-icon">${icon}</div>
      `;
      compatList.appendChild(row);
    });
    document.getElementById('compat-card').style.display = 'block';
  } else {
    document.getElementById('compat-card').style.display = 'none';
  }

  // Suggestion
  document.getElementById('suggestion-text').textContent = result.suggestion;
}

// ─── Reset ────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  // Reset state
  state.completo = null;
  Object.keys(state.prendas).forEach(p => {
    state.prendas[p] = { file: null, img: null, colors: [] };
  });

  // Reset UI
  previewContainer.style.display = 'none';
  previewImg.src = '';
  fileCompleto.value = '';

  ['camisa','pantalon','zapatos'].forEach(p => {
    document.getElementById('img-' + p).style.display = 'none';
    document.getElementById('img-' + p).src = '';
    document.getElementById('card-' + p).classList.remove('has-image');
    document.getElementById('status-' + p).textContent = 'Tocá para agregar foto';
    document.getElementById('swatches-' + p).innerHTML = '';
    document.querySelector(`[data-prenda="${p}"]`).value = '';
  });

  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('input-area').style.display = 'block';
  document.getElementById('btn-analyze').textContent = 'Analizar outfit';
  checkReady();
});
</script>
